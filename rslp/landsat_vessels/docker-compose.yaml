version: "3.9"

services:
  # Define the base image
  base-image:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: base-image:latest   # Tag it as "base-image"

  # Define the landsat-vessels service
  landsat-vessels:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        base-image: service:base-image
    image: landsat_vessels:latest
    depends_on:
      - base-image
    ports:
      - 5555:5555
    shm_size: '15G'  # Add the shared memory size
    environment:
      # Make all GPUs visible.
      - NVIDIA_VISIBLE_DEVICES=all
      # Passthrough AWS credentials if available, since those are needed for handling
      # scene_id requests.
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]  # Ensure this service can access GPUs
    runtime: nvidia  # Use the NVIDIA runtime
