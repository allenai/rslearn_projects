# LEAKY-SPLIT LINEAR PROBE (reshape / pixel-shuffle head): frozen OlmoEarth backbone
# with a 1x1 conv -> PixelShuffle head (a single linear layer predicts all patch_size^2
# pixels per patch directly, instead of bilinearly upsampling a coarse prediction).
# Trained on the ORIGINAL leaky points split (jamaica_2025_points_leaky), evaluated on
# the dense-only held-out polygons. Plain CE (point training is class-balanced).
model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslearn.models.singletask.SingleTaskModel
      init_args:
        encoder:
          - class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
            init_args:
              model_id: OLMOEARTH_V1_BASE
              patch_size: 4
        decoder:
          # Reshape linear probe: 1x1 conv maps each frozen 1/4-res patch feature
          # (768) to num_classes * patch_size^2 = 2 * 4^2 = 32 channels (no activation);
          # PixelShuffle(4) reshapes those into the patch's 4x4 block of pixel logits.
          - class_path: rslearn.models.conv.Conv
            init_args:
              in_channels: 768
              out_channels: 32
              kernel_size: 1
              activation:
                class_path: torch.nn.Identity
          - class_path: rslearn.models.pixel_shuffle.PixelShuffle
            init_args:
              upscale_factor: 4
          - class_path: rslearn.train.tasks.segmentation.SegmentationHead
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 0.0001
    scheduler:
      class_path: rslearn.train.scheduler.PlateauScheduler
      init_args:
        factor: 0.2
        patience: 2
        min_lr: 0
        cooldown: 10
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/piperw/rslearn_projects/data/seagrass
    inputs:
      sentinel2_l2a:
        data_type: raster
        layers: ["sentinel2"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
      targets:
        data_type: raster
        layers: ["label_raster"]
        bands: ["label"]
        is_target: true
        dtype: INT32
    task:
      class_path: rslearn.train.tasks.segmentation.SegmentationTask
      init_args:
        num_classes: 2
        class_id_mapping: {0: 0, 2: 1, 255: 255}
        nodata_value: 255
        metric_kwargs:
          average: micro
        enable_f1_metric: true
        class_names: ["background", "dense_seagrass"]
    batch_size: 32
    num_workers: 16
    init_workers: 32
    default_config:
      crop_size: 64
      groups: ["jamaica_2025_points_leaky"]
      transforms:
        - class_path: rslearn.train.transforms.concatenate.Concatenate
          init_args:
            selections:
              sentinel2_l2a: []
            output_selector: image
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
    train_config:
      groups: ["jamaica_2025_points_leaky"]
      tags:
        split: train
      transforms:
        - class_path: rslearn.train.transforms.flip.Flip
          init_args:
            image_selectors: ["sentinel2_l2a", "target/classes", "target/valid"]
        - class_path: rslearn.train.transforms.concatenate.Concatenate
          init_args:
            selections:
              sentinel2_l2a: []
            output_selector: image
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
    val_config:
      groups: ["jamaica_2025_points_leaky"]
      tags:
        split: val
    test_config:
      groups: ["jamaica_2025_test_polygons_no_sparse"]
      load_all_crops: true
      overlap_pixels: 0
    predict_config:
      groups: ["jamaica_2025_test_polygons_no_sparse"]
      load_all_crops: true
      overlap_pixels: 0
trainer:
  max_epochs: 50
  accelerator: gpu
  devices: 1
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_accuracy
        mode: max
    - class_path: rslearn.train.callbacks.freeze_unfreeze.FreezeUnfreeze
      init_args:
        module_selector: ["model", "encoder", 0]
        unfreeze_at_epoch: null
project_name: seagrass
run_name: olmoearth_base_points_leaky_linprobe_reshape_binary
management_dir: /weka/dfive-default/piperw/rslearn_projects/projects
load_checkpoint_required: "no"
