# Test the binary seagrass checkpoint on the spatial held-out test polygons of the
# jamaica_2025_proper_splits group (split=test: dense polygons in held-out ~10 km
# cells, spatially disjoint from the train points). Dense-only evaluation.
# Pure-eval config: pass the checkpoint with `--ckpt_path` (see load_checkpoint_required below).
model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslearn.models.singletask.SingleTaskModel
      init_args:
        encoder:
          - class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
            init_args:
              model_id: OLMOEARTH_V1_BASE
              patch_size: 4
        decoder:
          - class_path: rslearn.models.unet.UNetDecoder
            init_args:
              in_channels: [[4, 768]]
              out_channels: 2
              num_channels: {2: 256, 1: 128}
          - class_path: rslearn.train.tasks.segmentation.SegmentationHead
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/piperw/rslearn_projects/data/seagrass
    inputs:
      sentinel2_l2a:
        data_type: raster
        layers: ["sentinel2"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
      targets:
        data_type: raster
        layers: ["label_raster"]
        bands: ["label"]
        is_target: true
        dtype: INT32
    task:
      class_path: rslearn.train.tasks.segmentation.SegmentationTask
      init_args:
        # Test polygons are dense-only (label_raster: 2=dense inside, 255=ignore
        # outside). Map dense (2) -> positive class 1, matching the trained model.
        num_classes: 2
        class_id_mapping: {0: 0, 2: 1, 255: 255}
        nodata_value: 255
        metric_kwargs:
          average: micro
        enable_f1_metric: true
        class_names: ["background", "dense_seagrass"]
    batch_size: 32
    num_workers: 16
    init_workers: 32
    default_config:
      crop_size: 64
      load_all_crops: true
      overlap_pixels: 0
      groups: ["jamaica_2025_proper_splits"]
      transforms:
        - class_path: rslearn.train.transforms.concatenate.Concatenate
          init_args:
            selections:
              sentinel2_l2a: []
            output_selector: image
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
    test_config:
      groups: ["jamaica_2025_proper_splits"]
      tags:
        split: test
trainer:
  accelerator: gpu
  devices: 1
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
project_name: seagrass
run_name: seagrass_proper_splits_test
management_dir: /weka/dfive-default/piperw/rslearn_projects/projects
# Pure-eval: don't auto-resolve a checkpoint from the (empty) run dir; use --ckpt_path.
load_checkpoint_required: "no"
