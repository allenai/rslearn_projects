config_version: "0.7.1"

data:
  temporality:
    name: framed_point_in_time
    lookbehind_observation:
      name: repeating_interval
      period_duration_days: 15
      num_periods: 4
    lookbehind_offset_days: 305
    lookahead_observation:
      name: repeating_interval
      period_duration_days: 15
      num_periods: 4
    lookahead_offset_days: 0

  modalities:
    sentinel2_l2a:
      space_mode: mosaic
    sentinel1_rtc:
      space_mode: mosaic

  output:
    data_type: raster
    fields:
      segment:
        field_type: segmentation
        allowed_values:
          - value: 0
            label: no_landslide
            color: [124, 67, 18, 255]
          - value: 1
            label: landslide
            color: [169, 214, 146, 255]
        nodata_value: 2

model:
  encoder:
    name: olmoearth
    patch_size: 4
    source:
      name: registry
      model_name: OlmoEarth-v1-Base
      embedding_size: 768
  tasks:
    segment:
      name: manual
      decoder_layers:
        - class_path: rslearn.models.unet.UNetDecoder
          init_args:
            in_channels: [[4, 768]]
            out_channels: 2
            conv_layers_per_resolution: 2
            num_channels: {8: 512, 4: 512, 2: 256, 1: 128}
        - class_path: rslearn.train.tasks.segmentation.SegmentationHead
          init_args:
            weights: [0.05, 0.95]
            dice_loss: true
      task:
        class_path: rslearn.train.tasks.segmentation.SegmentationTask
        init_args:
          num_classes: 2
          enable_miou_metric: true
          nodata_value: 2

input_preprocessing:
  default:
    input_size: 32
    input_mode: all_tiles
    transforms:
      - name: sentinel1_to_decibels
      - name: olmoearth_normalize
  train:
    additional_transforms:
      - name: random_flip
  predict:
    overlap_pixels: 8

labeled_data_prep:
  annotation_type: polygon
  sampler:
    name: noop
  window_preparer:
    name: standard_raster
    windowing_mode:
      name: per_annotation
      window_sizing:
        name: buffered
        buffer: 64
  data_splitter:
    name: spatial
    grid_size: 512
    train_prop: 0.7
    val_prop: 0.2
    test_prop: 0.1

training:
  max_epochs: 100
  batch_size: 1
  optimizer:
    name: adamw
    lr: 0.0001
  scheduler:
    name: plateau
    factor: 0.2
    patience: 2
    min_lr: 0
    cooldown: 10
  encoder_freezing:
    unfreeze_at_epoch: 10
    unfreeze_lr_factor: 10
  early_stopping:
    patience: 15

prediction_requests:
  partitioners:
    request_to_partitions:
      name: grid
      grid_size: 1.0
      overlap_size: 0.0
      projection: null
      clip: false
    partition_to_windows:
      name: grid
      grid_size: 1024
      overlap_size: 0.0
      projection:
        method: use_utm
      clip: false

  postprocessors:
    window:
      name: noop
    partition:
      name: combine_geotiff
    request:
      name: combine_geotiff

transpiler_context:
  downsample_factor: 4
  checkpoint_monitor: val_accuracy
  checkpoint_mode: max
