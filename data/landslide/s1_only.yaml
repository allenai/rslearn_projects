model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslearn.models.singletask.SingleTaskModel
      init_args:
        encoder:
          - class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
            init_args:
              model_id: OLMOEARTH_V1_BASE
              patch_size: 4
        decoder:
          - class_path: rslearn.models.unet.UNetDecoder
            init_args:
              in_channels: [[4, 768]]
              out_channels: 2
              conv_layers_per_resolution: 2
              num_channels: {8: 512, 4: 512, 2: 256, 1: 128}
          - class_path: rslearn.train.tasks.segmentation.SegmentationHead
            init_args:
                weights: [0.05, 0.95]
                dice_loss: true
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 0.0001
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: '/weka/dfive-default/piperw/rslearn_projects/data/landslide/sen12landslides/all_positives/'
    inputs:
      # OlmoEarth expects this key for Sentinel-1 GRD (vv, vh). Linear power -> dB in transforms.
      sentinel1:
        data_type: "raster"
        layers: ["pre_sentinel1", "post_sentinel1"]
        bands: ["vv", "vh"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
      targets:
        data_type: "raster"
        layers: ["label_raster"]
        bands: ["label"]
        dtype: INT32
        is_target: true
    task:
      class_path: rslearn.train.tasks.segmentation.SegmentationTask
      init_args:
        num_classes: 2
        enable_miou_metric: true
        nodata_value: 2
    batch_size: 2
    num_workers: 32
    default_config:
      groups: ["sen12_landslides", "osm_ski", "icimod"]
      transforms:
        - class_path: rslearn.train.transforms.sentinel1.Sentinel1ToDecibels
          init_args:
            selectors: ["sentinel1"]
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel1: ["vv", "vh"]
    train_config:
      tags:
        split: "train"
    val_config:
      tags:
        split: "val"
    test_config:
      tags:
        split: "val"
    predict_config:
      groups: ["sen12_landslides"]
      load_all_crops: true
      crop_size: 32
      overlap_pixels: 3
      skip_targets: true
      tags:
        split: "val"
trainer:
  max_epochs: 100
  callbacks:
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_accuracy
        mode: max
    - class_path: rslearn.train.callbacks.freeze_unfreeze.FreezeUnfreeze
      init_args:
        module_selector: ["model", "encoder", 0]
        unfreeze_at_epoch: 10
        unfreeze_lr_factor: 10
    - class_path: rslearn.train.prediction_writer.RslearnWriter
      init_args:
        output_layer: "baseline_apr13_output"
        selector: []
        layer_config:
          type: RASTER
          band_sets:
            - bands: ["label"]
              dtype: UINT8
          class_names:
            - no_landslide
            - landslide
            - no_data
project_name: landslides
run_name: sen12landslides_s1_only
management_dir: ./checkpoints
