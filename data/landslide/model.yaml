model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslearn.models.singletask.SingleTaskModel
      init_args:
        encoder:
          # This applies the OlmoEarth encoder on the inputs.
          - class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
            init_args:
              # This can be one of:
              # - OLMOEARTH_V1_NANO
              # - OLMOEARTH_V1_TINY
              # - OLMOEARTH_V1_BASE
              # - OLMOEARTH_V1_LARGE
              model_id: OLMOEARTH_V1_BASE
              # The patch size should be set between 1 and 8, depending on the size of
              # the features being predicted, and the available compute (lower patch
              # sizes are slower).
              patch_size: 4
        decoder:
          # For the decoder, we apply UNetDecoder to upsample features to the input
          # resolution. It isn't really a UNet since we only have features at one
          # resolution.
          - class_path: rslearn.models.unet.UNetDecoder
            init_args:
              in_channels: [[4, 768]]
              out_channels: 2
              conv_layers_per_resolution: 2
              num_channels: {8: 512, 4: 512, 2: 256, 1: 128}
          # The SegmentationHead computes softmax and cross entropy loss.
          - class_path: rslearn.train.tasks.segmentation.SegmentationHead
            init_args:
                weights: [0.05, 0.95]
                dice_loss: true
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 0.0001
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: '/weka/dfive-default/piperw/rslearn_projects/data/landslide/sen12landslides/all_positives/'
    inputs:
      # We read the four Sentinel-2 images materialized earlier.
      # OlmoEarth expects the input to be called "sentinel2_l2a".
      sentinel2_l2a:
        data_type: "raster"
        layers: ["pre_sentinel2", "post_sentinel2"]
        # This is the band order expected by  OlmoEarth.
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
      targets:
        data_type: "raster"
        layers: ["label_raster"]
        bands: ["label"]
        dtype: INT32
        is_target: true
    task:
      class_path: rslearn.train.tasks.segmentation.SegmentationTask
      init_args:
        num_classes: 2
        enable_miou_metric: true
        nodata_value: 2
    batch_size: 8
    num_workers: 32
    default_config:
      groups: ["sen12_landslides"]
      transforms:
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
    train_config:
      tags:
        split: "train"
    val_config:
      tags:
        split: "val"
    test_config:
      tags:
        split: "val"
    predict_config:
      groups: ["sen12_landslides"]
      load_all_crops: true
      # Sliding-window inference tile size (was patch_size).
      crop_size: 32
      # Shared border between adjacent tiles: matches deprecated overlap_ratio=0.1 with crop 32 (round(32*0.1)=3).
      overlap_pixels: 3
      skip_targets: true
      tags:
        split: "val"
trainer:
  max_epochs: 100
  callbacks:
    # With management_dir set, rslearn disables Lightning's built-in checkpointing and
    # expects ManagedBestLastCheckpoint (writes last.ckpt + best.ckpt under default_root_dir).
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_accuracy
        mode: max
    # We find that freezing the model for the first few epochs helps to improve the
    # performance of the fine-tuned models.
    - class_path: rslearn.train.callbacks.freeze_unfreeze.FreezeUnfreeze
      init_args:
        module_selector: ["model", "encoder", 0]
        unfreeze_at_epoch: 10
    # The RslearnWriter is used during `model predict` to save the predicted outputs to
    # the rslearn dataset. It's not needed for training, so we comment it out here.
    # Uncomment and set output_layer when using this config for prediction.
    - class_path: rslearn.train.prediction_writer.RslearnWriter
      init_args:
        path: /weka/dfive-default/piperw/rslearn_projects/data/landslide/sen12landslides/all_positives/
        output_layer: "label_raster"
        selector: []
# Here we enable automatic checkpoint management and logging to W&B.
# Set WANDB_MODE=offline to disable online logging.
project_name: landslides
run_name: sen12landslides_all_positives_apr8_test
management_dir: ./checkpoints
