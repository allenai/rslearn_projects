model:
  class_path: rslp.vessel_attribute.train.VesselAttributeLightningModule
  init_args:
    model:
      class_path: rslearn.models.multitask.MultiTaskModel
      init_args:
        encoder:
          - class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
            init_args:
              model_id: OLMOEARTH_V1_TINY
              patch_size: 4
        decoders:
          length:
            - class_path: rslearn.models.pooling_decoder.PoolingDecoder
              init_args:
                in_channels: 192
                out_channels: 1
                num_conv_layers: 1
                num_fc_layers: 2
            - class_path: rslearn.train.tasks.regression.RegressionHead
          width:
            - class_path: rslearn.models.pooling_decoder.PoolingDecoder
              init_args:
                in_channels: 192
                out_channels: 1
                num_conv_layers: 1
                num_fc_layers: 2
            - class_path: rslearn.train.tasks.regression.RegressionHead
          speed:
            - class_path: rslearn.models.pooling_decoder.PoolingDecoder
              init_args:
                in_channels: 192
                out_channels: 1
                num_conv_layers: 1
                num_fc_layers: 2
            - class_path: rslearn.train.tasks.regression.RegressionHead
          heading_x:
            - class_path: rslearn.models.pooling_decoder.PoolingDecoder
              init_args:
                in_channels: 192
                out_channels: 1
                num_conv_layers: 1
                num_fc_layers: 2
            - class_path: rslearn.train.tasks.regression.RegressionHead
          heading_y:
            - class_path: rslearn.models.pooling_decoder.PoolingDecoder
              init_args:
                in_channels: 192
                out_channels: 1
                num_conv_layers: 1
                num_fc_layers: 2
            - class_path: rslearn.train.tasks.regression.RegressionHead
          ship_type:
            - class_path: rslearn.models.pooling_decoder.PoolingDecoder
              init_args:
                in_channels: 192
                out_channels: 9
                num_conv_layers: 1
                num_fc_layers: 2
            - class_path: rslearn.train.tasks.classification.ClassificationHead
    scheduler:
      class_path: rslearn.train.scheduler.PlateauScheduler
      init_args:
        factor: 0.2
        patience: 2
        min_lr: 0
        cooldown: 10
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 0.0001
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/landsat_vessel_attribute/dataset_v1/20260330/
    inputs:
      landsat:
        data_type: "raster"
        layers: ["landsat"]
        bands: ["B8", "B1", "B2", "B3", "B4", "B5", "B6", "B7", "B9", "B10", "B11"]
        passthrough: true
        dtype: FLOAT32
      info:
        data_type: "vector"
        layers: ["info"]
        is_target: true
    task:
      class_path: rslp.vessel_attribute.train.VesselAttributeMultiTask
      init_args:
        image_bands: [4, 3, 2]
        remap_values: [[0.33, 0.71], [0, 255]]
        length_buckets: [10, 20, 30, 50, 75, 100, 150, 200]
        width_buckets: [5, 10, 20]
        speed_buckets: [2, 4, 8]
        tasks:
          length:
            class_path: rslearn.train.tasks.regression.RegressionTask
            init_args:
              property_name: "length"
              allow_invalid: true
              scale_factor: 0.01
              metric_mode: l1
          width:
            class_path: rslearn.train.tasks.regression.RegressionTask
            init_args:
              property_name: "width"
              allow_invalid: true
              scale_factor: 0.01
              metric_mode: l1
          speed:
            class_path: rslearn.train.tasks.regression.RegressionTask
            init_args:
              property_name: "sog"
              allow_invalid: true
              scale_factor: 0.01
              metric_mode: l1
          heading_x:
            class_path: rslearn.train.tasks.regression.RegressionTask
            init_args:
              property_name: "cog_x"
              allow_invalid: true
              metric_mode: l1
          heading_y:
            class_path: rslearn.train.tasks.regression.RegressionTask
            init_args:
              property_name: "cog_y"
              allow_invalid: true
              metric_mode: l1
          ship_type:
            class_path: rslearn.train.tasks.classification.ClassificationTask
            init_args:
              property_name: "type"
              allow_invalid: true
              classes: ["cargo", "tanker", "passenger", "service", "tug", "pleasure", "fishing", "enforcement", "sar"]
              metric_kwargs:
                average: "micro"
        input_mapping:
          length:
            info: "targets"
          width:
            info: "targets"
          speed:
            info: "targets"
          heading_x:
            info: "targets"
          heading_y:
            info: "targets"
          ship_type:
            info: "targets"
    batch_size: 32
    num_workers: 64
    default_config:
      transforms:
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              landsat: ["B8", "B1", "B2", "B3", "B4", "B5", "B6", "B7", "B9", "B10", "B11"]
        - class_path: rslearn.train.transforms.pad.Pad
          init_args:
            size: 64
            mode: "center"
            image_selectors: ["landsat"]
        - class_path: rslearn.train.transforms.concatenate.Concatenate
          init_args:
            selections:
              landsat: []
            output_selector: image
    train_config:
      transforms:
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              landsat: ["B8", "B1", "B2", "B3", "B4", "B5", "B6", "B7", "B9", "B10", "B11"]
        - class_path: rslearn.train.transforms.pad.Pad
          init_args:
            size: 64
            mode: "center"
            image_selectors: ["landsat"]
        - class_path: rslp.vessel_attribute.train.VesselAttributeFlip
          init_args:
            image_keys: ["landsat"]
      tags:
        split: "train"
    val_config:
      tags:
        split: "val"
    test_config:
      tags:
        split: "val"
    predict_config:
      groups: ["attribute_predict"]
      skip_targets: true
trainer:
  max_epochs: 100
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: "epoch"
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_ship_type/accuracy
        mode: max
    - class_path: rslearn.train.prediction_writer.RslearnWriter
      init_args:
        output_layer: output
project_name: landsat_vessel_attribute
run_name: data_20260330_olmoearth_tiny_64_01
management_dir: ${RSLP_PREFIX}/projects
