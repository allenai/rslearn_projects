model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslearn.models.singletask.SingleTaskModel
      init_args:
        encoder:
          - class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
            init_args:
              model_id: OLMOEARTH_V1_2_BASE
              patch_size: 4
        decoder:
          - class_path: rslearn.models.pooling_decoder.PoolingDecoder
            init_args:
              in_channels: 768
              out_channels: 2
              num_conv_layers: 1
              num_fc_layers: 1
          - class_path: rslearn.train.tasks.classification.ClassificationHead
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 0.0001
    scheduler:
      class_path: rslearn.train.scheduler.PlateauScheduler
      init_args:
        factor: 0.1
        patience: 10
        min_lr: 0
        cooldown: 0
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/landsat_vessel_detection/classifier/dataset_20250624/
    inputs:
      landsat:
        data_type: "raster"
        layers: ["landsat_allbands"]
        bands: ["B8", "B1", "B2", "B3", "B4", "B5", "B6", "B7", "B9", "B10", "B11"]
        passthrough: true
        dtype: FLOAT32
      targets:
        data_type: "vector"
        layers: ["label"]
        is_target: true
    task:
      class_path: rslearn.train.tasks.classification.ClassificationTask
      init_args:
        property_name: "label"
        classes: ["correct", "incorrect"]
        enable_f1_metric: true
        skip_unknown_categories: true
        allow_invalid: true
    batch_size: 64
    num_workers: 8
    default_config:
      groups: ["selected_copy", "phase2a_completed", "feedback_20260325", "phase3a_selected"]
      transforms:
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              landsat: ["B8", "B1", "B2", "B3", "B4", "B5", "B6", "B7", "B9", "B10", "B11"]
    train_config:
      tags:
       split: "train"
      transforms:
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              landsat: ["B8", "B1", "B2", "B3", "B4", "B5", "B6", "B7", "B9", "B10", "B11"]
        - class_path: rslearn.train.transforms.flip.Flip
          init_args:
            image_selectors: ["landsat"]
    val_config:
      tags:
        split: "val"
    test_config:
      tags:
        split: "test"
    predict_config:
      groups: ["feedback_classify_predict"]
      skip_targets: true
trainer:
  max_epochs: 100
  callbacks:
    - class_path: rslearn.train.prediction_writer.RslearnWriter
      init_args:
        output_layer: "output"
    - class_path: rslearn.train.callbacks.freeze_unfreeze.FreezeUnfreeze
      init_args:
        module_selector: ["model", "encoder", 0]
        unfreeze_at_epoch: 20
        unfreeze_lr_factor: 10
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_correct_f1
        mode: max
project_name: landsat_vessel_classification_v2
run_name: olmoearth_base_v1.2_final_20260616
management_dir: ${RSLP_PREFIX}/projects
