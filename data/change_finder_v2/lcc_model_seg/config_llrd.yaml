model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslearn.models.singletask.SingleTaskModel
      init_args:
        encoder:
          - class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
            init_args:
              model_id: OLMOEARTH_V1_1_BASE
              patch_size: 4
              use_legacy_timestamps: true
        decoder:
          - class_path: rslearn.models.unet.UNetDecoder
            init_args:
              in_channels: [[4, 768]]
              out_channels: 11
              num_channels: {2: 256, 1: 128}
          - class_path: rslp.change_finder_v2.lcc_model_seg.head.BalancedSegmentationHead
    optimizer:
      class_path: rslearn.models.olmoearth_pretrain.optimizer.LayerDecayAdamW
      init_args:
        lr: 0.0001
        layer_decay_rate: 0.8
        num_layers: 12
        encoder_prefix: "model.encoder.0"
    scheduler:
      class_path: rslearn.train.scheduler.PlateauScheduler
      init_args:
        factor: 0.2
        patience: 2
        min_lr: 0
        cooldown: 10
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/change_finder/lcc_seg_dataset_20260701/
    inputs:
      sentinel2_l2a:
        data_type: "raster"
        layers: ["sentinel2_historical", "sentinel2_recent"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
      targets:
        data_type: "raster"
        layers: ["label"]
        bands: ["label"]
        is_target: true
        dtype: INT32
    task:
      class_path: rslearn.train.tasks.segmentation.SegmentationTask
      init_args:
        num_classes: 11
        nodata_value: 0
        enable_confusion_matrix: true
        class_names: ["nodata", "no_change", "deforestation", "urban_expansion", "construction_mining", "from_water", "to_water", "urban_erosion", "new_crop_field", "wetland_loss", "forest_regrowth"]
        metric_kwargs:
          average: "micro"
    batch_size: 4
    num_workers: 16
    default_config:
      crop_size: 64
      transforms:
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
    train_config:
      # 128x128 windows are randomly cropped to 64x64 (load_all_crops false), keeping
      # the centered annotated point in-crop.
      crop_size: 64
      transforms:
        - class_path: rslearn.train.transforms.flip.Flip
          init_args:
            image_selectors: ["sentinel2_l2a", "target/classes", "target/valid"]
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
      tags:
        split: "train"
    val_config:
      crop_size: 64
      tags:
        split: "val"
    test_config:
      crop_size: 64
      tags:
        split: "val"
    # Prediction-time only: used by `rslearn model predict` over an eval dataset
    # (override --data.init_args.path). The eval windows live in group "predict"
    # and have no targets, so skip them.
    predict_config:
      groups: ["predict"]
      crop_size: 64
      load_all_crops: true
      skip_targets: true
      transforms:
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
trainer:
  max_epochs: 100
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: "epoch"
    # SimpleFreeze (not FreezeUnfreeze) because LayerDecayAdamW already includes all
    # params in its per-layer groups; FreezeUnfreeze would rewrite those groups and
    # clobber the per-layer LRs. SimpleFreeze only toggles requires_grad.
    - class_path: rslearn.models.olmoearth_pretrain.optimizer.SimpleFreeze
      init_args:
        module_selector: ["model", "encoder", 0]
        unfreeze_at_epoch: 10
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_accuracy
        mode: max
    # Prediction-time only (BasePredictionWriter): writes the argmax transition
    # class raster to the "output" layer. Only fires during `predict`.
    - class_path: rslearn.train.prediction_writer.RslearnWriter
      init_args:
        output_layer: output
        selector: []
project_name: 2026_07_01_lcc_seg
run_name: olmoearth_base_ps4_llrd_01
management_dir: ${RSLP_PREFIX}/projects
