model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslp.change_finder_v2.annotation_timestamp_helper.model.AnnotationTimestampModel
      init_args:
        encoder:
          class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
          init_args:
            model_id: OLMOEARTH_V1_1_BASE
            patch_size: 4
            token_pooling: false
            use_legacy_timestamps: false
        embedding_dim: 768
        num_heads: 8
        num_layers: 2
        dropout: 0.1
    optimizer:
      class_path: rslearn.models.olmoearth_pretrain.optimizer.LayerDecayAdamW
      init_args:
        lr: 0.0001
        layer_decay_rate: 0.65
        num_layers: 12
        encoder_prefix: "model.encoder"
    scheduler:
      class_path: rslearn.train.scheduler.PlateauScheduler
      init_args:
        factor: 0.2
        patience: 2
        min_lr: 0
        cooldown: 10
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/change_finder/annotation_timestamp_helper/
    inputs:
      sentinel2_monthly:
        data_type: "raster"
        layers: ["sentinel2_monthly"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
      targets:
        data_type: "vector"
        layers: ["label_timestamps"]
        is_target: true
    task:
      class_path: rslp.change_finder_v2.annotation_timestamp_helper.tasks.TimestampHelperTask
      init_args:
        input_key: sentinel2_monthly
        target_key: targets
    batch_size: 8
    num_workers: 8
    use_in_memory_dataset: true
    default_config:
      crop_size: 32
      transforms:
        - class_path: rslp.change_finder_v2.annotation_timestamp_helper.transforms.TemporalCropFiveYears
          init_args:
            deterministic: true
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
    train_config:
      tags:
        split: "train"
      transforms:
        - class_path: rslp.change_finder_v2.annotation_timestamp_helper.transforms.TemporalCropFiveYears
          init_args:
            deterministic: false
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
    val_config:
      tags:
        split: "val"
    test_config:
      tags:
        split: "val"
trainer:
  max_epochs: 100
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: "epoch"
    - class_path: rslearn.train.callbacks.freeze_unfreeze.FreezeUnfreeze
      init_args:
        module_selector: ["model", "encoder", "model"]
        unfreeze_at_epoch: 10
        unfreeze_lr_factor: 10
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_accuracy
        mode: max
project_name: 2026_06_change_finder_v2_timestamp_helper
run_name: olmoearth_base_center_token_temporal_attention
management_dir: ${RSLP_PREFIX}/projects
