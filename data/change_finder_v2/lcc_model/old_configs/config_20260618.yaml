model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslp.change_finder_v2.lcc_model.model_20260618.TransitionDualPassModel
      init_args:
        encoder:
          class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
          init_args:
            model_id: OLMOEARTH_V1_1_BASE
            patch_size: 4
            token_pooling: false
            use_legacy_timestamps: false
        num_classes: 10
        num_timesteps: 20
        num_pass1: 10
        embedding_dim: 768
        decoder_stages:
          - [[768, 3]]
          - [[256, 3]]
          - [[128, 3]]
        temporal_depth: 1
        temporal_heads: 8
        transition_loss_weight: 1.0
    optimizer:
      class_path: rslearn.models.olmoearth_pretrain.optimizer.LayerDecayAdamW
      init_args:
        lr: 0.0001
        layer_decay_rate: 0.65
        num_layers: 12
        encoder_prefix: "model.encoder"
    scheduler:
      class_path: rslearn.train.scheduler.PlateauScheduler
      init_args:
        factor: 0.2
        patience: 5
        min_lr: 0
        cooldown: 10
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/change_finder/lcc_model_dataset_20260616/
    inputs:
      sentinel2_quarterly:
        data_type: "raster"
        layers: ["sentinel2_quarterly"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
      sentinel2_frequent_0:
        data_type: "raster"
        layers: ["sentinel2_frequent_0"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
      sentinel2_frequent_1:
        data_type: "raster"
        layers: ["sentinel2_frequent_1"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
        required: false
      sentinel2_frequent_2:
        data_type: "raster"
        layers: ["sentinel2_frequent_2"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
        required: false
      sentinel2_frequent_3:
        data_type: "raster"
        layers: ["sentinel2_frequent_3"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
        required: false
      sentinel2_frequent_4:
        data_type: "raster"
        layers: ["sentinel2_frequent_4"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
        required: false
      sentinel2_frequent_5:
        data_type: "raster"
        layers: ["sentinel2_frequent_5"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
        required: false
      sentinel2_frequent_6:
        data_type: "raster"
        layers: ["sentinel2_frequent_6"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
        required: false
      sentinel2_frequent_7:
        data_type: "raster"
        layers: ["sentinel2_frequent_7"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
        required: false
      label_binary:
        data_type: "raster"
        layers: ["label_binary"]
        bands: ["label"]
        is_target: true
        dtype: INT32
      label_src:
        data_type: "raster"
        layers: ["label_src"]
        bands: ["label"]
        is_target: true
        dtype: INT32
      label_dst:
        data_type: "raster"
        layers: ["label_dst"]
        bands: ["label"]
        is_target: true
        dtype: INT32
    task:
      class_path: rslp.change_finder_v2.lcc_model.model_20260618.LCCTransitionMultiTask
      init_args:
        annotations_path: /weka/dfive-default/rslearn-eai/datasets/change_finder/lcc_model_dataset_20260616/lcc_annotations.json
        num_classes: 10
        class_names: ["no_change", "deforestation", "urban_expansion", "construction_mining", "from_water", "to_water", "urban_erosion", "new_crop_field", "wetland_loss", "forest_regrowth"]
        input_mapping:
          binary:
            label_binary: targets
          src:
            label_src: targets
          dst:
            label_dst: targets
        tasks:
          binary:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              num_classes: 3
              nodata_value: 0
              class_names: ["nodata", "no_change", "change"]
              enable_accuracy_metric: false
              metric_kwargs:
                average: "micro"
          src:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              num_classes: 13
              nodata_value: 0
              enable_accuracy_metric: false
              class_names: ["nodata", "bare", "burnt", "crops", "fallow/shifting cultivation", "grassland", "Lichen and moss", "shrub", "snow and ice", "tree", "urban/built-up", "water", "wetland (herbaceous)"]
              metric_kwargs:
                average: "micro"
          dst:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              num_classes: 13
              nodata_value: 0
              enable_accuracy_metric: false
              class_names: ["nodata", "bare", "burnt", "crops", "fallow/shifting cultivation", "grassland", "Lichen and moss", "shrub", "snow and ice", "tree", "urban/built-up", "water", "wetland (herbaceous)"]
              metric_kwargs:
                average: "micro"
    batch_size: 4
    num_workers: 16
    use_in_memory_dataset: false
    default_config:
      crop_size: 64
      transforms:
        - class_path: rslp.change_finder_v2.lcc_model.model_20260618.FrequentOptionSampler
          init_args:
            deterministic: true
        - class_path: rslp.change_finder_v2.lcc_model.model_20260618.TransitionLabelBuilder
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
    train_config:
      transforms:
        - class_path: rslp.change_finder_v2.lcc_model.model_20260618.FrequentOptionSampler
          init_args:
            deterministic: false
        - class_path: rslearn.train.transforms.flip.Flip
          init_args:
            image_selectors:
              - "sentinel2_l2a"
              - "target/binary/classes"
              - "target/binary/valid"
              - "target/src/classes"
              - "target/src/valid"
              - "target/dst/classes"
              - "target/dst/valid"
              - "target/timestamps/start"
              - "target/timestamps/end"
              - "target/timestamps/valid"
        - class_path: rslp.change_finder_v2.lcc_model.model_20260618.TransitionLabelBuilder
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
      tags:
        split: "train"
    val_config:
      tags:
        split: "val"
    test_config:
      tags:
        split: "val"
trainer:
  max_epochs: 200
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: "epoch"
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_transition/accuracy
        mode: max
project_name: 2026_06_16_lcc
run_name: transition_dualpass_20260618_01
management_dir: ${RSLP_PREFIX}/projects
