model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslp.change_finder_v2.lcc_model.model_fable_20260710.FableChangeModel
      init_args:
        encoder:
          class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
          init_args:
            model_id: OLMOEARTH_V1_2_BASE
            patch_size: 4
            token_pooling: false
            use_legacy_timestamps: false
        num_classes_binary: 3
        num_classes_src: 13
        num_classes_dst: 13
        num_timesteps: 20
        embedding_dim: 768
        decoder_stages:
        - - - 768
            - 3
        - - - 256
            - 3
        - - - 128
            - 3
        binary_loss_weight: 2.0
        binary_mode: hybrid
    optimizer:
      class_path: rslearn.models.olmoearth_pretrain.optimizer.LayerDecayAdamW
      init_args:
        lr: 0.0001
        layer_decay_rate: 0.65
        num_layers: 12
        encoder_prefix: model.encoder
    scheduler:
      class_path: rslearn.train.scheduler.PlateauScheduler
      init_args:
        factor: 0.2
        patience: 5
        min_lr: 0
        cooldown: 10
