            - B03
            - B04
            - B08
            - B05
            - B06
            - B07
            - B8A
            - B11
            - B12
            - B01
            - B09
      tags:
        split: train
    val_config:
      tags:
        split: val
    test_config:
      tags:
        split: val
trainer:
  max_epochs: 200
  callbacks:
  - class_path: lightning.pytorch.callbacks.LearningRateMonitor
    init_args:
      logging_interval: epoch
  - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
    init_args:
      monitor: val_binary/auroc
      mode: max
project_name: 2026_07_10_lcc_fable
