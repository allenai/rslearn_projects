model:
  init_args:
    optimizer:
      class_path: rslearn.models.olmoearth_pretrain.optimizer.LayerDecayAdamW
      init_args:
        lr: 0.0003
        layer_decay_rate: 0.9
        num_layers: 12
        encoder_prefix: model.encoder
trainer:
  callbacks+:
  - class_path: rslearn.models.olmoearth_pretrain.optimizer.SimpleFreeze
    init_args:
      module_selector:
      - model
      - encoder
      unfreeze_at_epoch: 5
run_name: opt_lr3e-4_decay0.9_uf5
