model:
  init_args:
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 0.0003
trainer:
  callbacks+:
  - class_path: rslearn.train.callbacks.freeze_unfreeze.FreezeUnfreeze
    init_args:
      module_selector:
      - model
      - encoder
      unfreeze_at_epoch: 5
      unfreeze_lr_factor: 1
run_name: optf_lr3e-4_uf5_factor1
