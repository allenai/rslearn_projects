model:
  init_args:
    model:
      class_path: rslp.change_finder_v2.lcc_model.model_singlepass.SinglePassChangeModel
      init_args:
        encoder:
          class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
          init_args:
            model_id: OLMOEARTH_V1_2_SMALL
            patch_size: 4
            token_pooling: false
            use_legacy_timestamps: false
        num_classes_binary: 3
        num_classes_src: 13
        num_classes_dst: 13
        num_timesteps: 20
        embedding_dim: 384
        decoder_stages:
          - [[384, 3]]
          - [[256, 3]]
          - [[128, 3]]
        binary_loss_weight: 2.0
run_name: size_small
