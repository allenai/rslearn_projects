model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslp.olmoearth_evals.eval_adapter.EvalAdapterModel
      init_args:
        # Source windows are 53x53 with only the central 10x10 labeled. The Pad in
        # default_config below center-crops to 32x32 around the labeled region.
        input_size: 32
        input_modalities: ["sentinel2"]
        task_type: "segment"
        task_name: "worldcover"
        task_channels: 12
        task_timesteps: 12
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 0.0001
    scheduler:
      class_path: rslearn.train.scheduler.PlateauScheduler
      init_args:
        factor: 0.2
        patience: 2
        min_lr: 0
        cooldown: 10
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/worldcover/
    inputs:
      sentinel2:
        data_type: "raster"
        layers: ["sentinel2", "sentinel2.1", "sentinel2.2", "sentinel2.3", "sentinel2.4", "sentinel2.5", "sentinel2.6", "sentinel2.7", "sentinel2.8", "sentinel2.9", "sentinel2.10", "sentinel2.11"]
        bands: ["B01", "B02", "B03", "B04", "B05", "B06", "B07", "B08", "B8A", "B09", "B11", "B12"]
        passthrough: true
        load_all_layers: true
        load_all_item_groups: false
      targets:
        data_type: "raster"
        layers: ["label_raster"]
        bands: ["label"]
        is_target: true
        dtype: INT32
    task:
      class_path: rslearn.train.tasks.multi_task.MultiTask
      init_args:
        tasks:
          eval_task:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              # bare, burnt, crops, fallow/shifting cultivation, grassland,
              # Lichen and moss, shrub, snow and ice, tree, urban/built-up,
              # water, wetland (herbaceous). Source label 0 (no_data) is
              # remapped to nodata index 12.
              num_classes: 12
              class_id_mapping: {1: 0, 2: 1, 3: 2, 4: 3, 5: 4, 6: 5, 7: 6, 8: 7, 9: 8, 10: 9, 11: 10, 12: 11, 0: 12}
              nodata_value: 12
              metric_kwargs:
                average: "micro"
        input_mapping:
          eval_task:
            targets: "targets"
    batch_size: 8
    num_workers: 16
    default_config:
      transforms:
        - class_path: rslearn.train.transforms.pad.Pad
          init_args:
            mode: "center"
            size: 32
            image_selectors: ["sentinel2", "target/eval_task/classes", "target/eval_task/valid"]
        - class_path: rslp.olmoearth_evals.eval_adapter.EvalAdapterNormalize
          init_args:
            input_size: 32
            input_modalities: ["sentinel2"]
            task_type: "segment"
            task_name: "worldcover"
            task_channels: 12
            task_timesteps: 12
      groups: ["20260109"]
    train_config:
      tags:
        split: "train"
    val_config:
      tags:
        split: "val"
    test_config:
      tags:
        split: "val"
trainer:
  max_epochs: 100
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: "epoch"
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_eval_task/accuracy
        mode: max
project_name: placeholder
run_name: placeholder
management_dir: ${RSLP_PREFIX}/projects
