model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslp.olmoearth_evals.eval_adapter.EvalAdapterModel
      init_args:
        input_size: 32
        input_modalities: ["sentinel2"]
        task_type: "segment"
        task_name: "kenya_intercropping"
        task_channels: 3
        task_timesteps: 6
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 0.0001
    scheduler:
      class_path: rslearn.train.scheduler.PlateauScheduler
      init_args:
        factor: 0.2
        patience: 2
        min_lr: 0
        cooldown: 10
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/olmoearth_evals/kenya_intercropping/
    inputs:
      sentinel2:
        data_type: "raster"
        layers: ["sentinel2", "sentinel2.1", "sentinel2.2", "sentinel2.3", "sentinel2.4", "sentinel2.5"]
        bands: ["B01", "B02", "B03", "B04", "B05", "B06", "B07", "B08", "B8A", "B09", "B11", "B12"]
        passthrough: true
        load_all_layers: true
        load_all_item_groups: false
      targets:
        data_type: "raster"
        layers: ["label_raster"]
        bands: ["label"]
        is_target: true
        dtype: INT32
    task:
      class_path: rslearn.train.tasks.multi_task.MultiTask
      init_args:
        tasks:
          eval_task:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              num_classes: 3
              nodata_value: 255
              metric_kwargs:
                average: "micro"
        input_mapping:
          eval_task:
            targets: "targets"
    batch_size: 8
    num_workers: 8
    use_in_memory_dataset: true
    default_config:
      crop_size: 32
      transforms:
        - class_path: rslp.olmoearth_evals.eval_adapter.EvalAdapterNormalize
          init_args:
            input_size: 32
            input_modalities: ["sentinel2"]
            task_type: "segment"
            task_name: "kenya_intercropping"
            task_channels: 3
            task_timesteps: 6
    train_config:
      groups: ["train"]
    val_config:
      groups: ["val"]
    test_config:
      groups: ["test"]
trainer:
  max_epochs: 100
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: "epoch"
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_eval_task/accuracy
        mode: max
project_name: placeholder
run_name: placeholder
management_dir: ${RSLP_PREFIX}/projects
