model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslp.olmoearth_evals.eval_adapter.EvalAdapterModel
      init_args:
        input_size: 64
        input_modalities: ["sentinel2", "landsat"]
        task_type: "segment"
        task_name: "hls_burn_scars"
        task_channels: 2
        task_timesteps: 1
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 0.0001
    scheduler:
      class_path: rslearn.train.scheduler.PlateauScheduler
      init_args:
        factor: 0.2
        patience: 2
        min_lr: 0
        cooldown: 10
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/olmoearth_evals/hls_burn_scars/
    inputs:
      sentinel2:
        data_type: "raster"
        layers: ["sentinel2"]
        bands: ["B01", "B02", "B03", "B04", "B05", "B06", "B07", "B08", "B8A", "B09", "B11", "B12"]
        passthrough: true
        dtype: FLOAT32
      landsat:
        data_type: "raster"
        layers: ["landsat"]
        bands: ["B1", "B2", "B3", "B4", "B5", "B6", "B7", "B8", "B9", "B10", "B11"]
        passthrough: true
        dtype: FLOAT32
      targets:
        data_type: "raster"
        layers: ["label_raster"]
        bands: ["label"]
        is_target: true
        dtype: INT32
    task:
      class_path: rslearn.train.tasks.multi_task.MultiTask
      init_args:
        tasks:
          eval_task:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              num_classes: 2
              nodata_value: 255
              class_id_mapping: {0: 0, 1: 1, -1: 255}
              metric_kwargs:
                average: "micro"
        input_mapping:
          eval_task:
            targets: "targets"
    batch_size: 8
    num_workers: 8
    use_in_memory_dataset: true
    default_config:
      crop_size: 64
      transforms:
        - class_path: rslearn.train.transforms.flip.Flip
          init_args:
            image_selectors: ["sentinel2", "landsat", "target/eval_task/classes", "target/eval_task/valid"]
            skip_missing: true
        - class_path: rslp.olmoearth_evals.eval_adapter.EvalAdapterNormalize
          init_args:
            input_size: 64
            input_modalities: ["sentinel2", "landsat"]
            task_type: "segment"
            task_name: "hls_burn_scars"
            task_channels: 2
            task_timesteps: 1
    train_config:
      groups: ["train"]
    val_config:
      groups: ["val"]
      load_all_crops: true
      crop_size: 64
    test_config:
      groups: ["val"]
      load_all_crops: true
      crop_size: 64
trainer:
  max_epochs: 100
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: "epoch"
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_eval_task/accuracy
        mode: max
project_name: placeholder
run_name: placeholder
management_dir: ${RSLP_PREFIX}/projects
