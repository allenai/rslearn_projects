model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslp.olmoearth_evals.eval_adapter.EvalAdapterModel
      init_args:
        input_size: 64
        input_modalities: ["landsat"]
        task_type: "classify"
        task_name: "small_landsat_vessel_type"
        task_channels: 9
        task_timesteps: 1
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 0.0001
    scheduler:
      class_path: rslearn.train.scheduler.PlateauScheduler
      init_args:
        factor: 0.2
        patience: 2
        min_lr: 0
        cooldown: 20
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/olmoearth_evals/small_landsat_vessel_attribute/
    inputs:
      landsat:
        data_type: "raster"
        layers: ["landsat_allbands"]
        bands: ["B1", "B2", "B3", "B4", "B5", "B6", "B7", "B8", "B9", "B10", "B11"]
        passthrough: true
        dtype: FLOAT32
      info:
        data_type: "vector"
        layers: ["info"]
        is_target: true
    task:
      class_path: rslearn.train.tasks.multi_task.MultiTask
      init_args:
        tasks:
          eval_task:
            class_path: rslearn.train.tasks.classification.ClassificationTask
            init_args:
              property_name: "type"
              allow_invalid: true
              classes: ["cargo", "tanker", "passenger", "service", "tug", "pleasure", "fishing", "enforcement", "sar"]
              metric_kwargs:
                average: "micro"
        input_mapping:
          eval_task:
            info: "targets"
    batch_size: 16
    num_workers: 16
    use_in_memory_dataset: true
    default_config:
      transforms:
        - class_path: rslp.olmoearth_evals.eval_adapter.EvalAdapterNormalize
          init_args:
            input_size: 64
            input_modalities: ["landsat"]
            task_type: "classify"
            task_name: "small_landsat_vessel_type"
            task_channels: 9
            task_timesteps: 1
    train_config:
      groups: ["train"]
    val_config:
      groups: ["val"]
    test_config:
      groups: ["test"]
trainer:
  max_epochs: 100
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: "epoch"
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_eval_task/accuracy
        mode: max
