model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslearn.models.multitask.MultiTaskModel
      init_args:
        encoder:
          - class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
            init_args:
              model_id: OLMOEARTH_V1_BASE
              patch_size: 4
        decoders:
          binary:
            - class_path: rslearn.models.unet.UNetDecoder
              init_args:
                in_channels: [[4, 768]]
                out_channels: 3
                num_channels: {2: 256, 1: 128}
            - class_path: rslearn.train.tasks.segmentation.SegmentationHead
          src:
            - class_path: rslearn.models.unet.UNetDecoder
              init_args:
                in_channels: [[4, 768]]
                out_channels: 13
                num_channels: {2: 256, 1: 128}
            - class_path: rslearn.train.tasks.segmentation.SegmentationHead
          dst:
            - class_path: rslearn.models.unet.UNetDecoder
              init_args:
                in_channels: [[4, 768]]
                out_channels: 13
                num_channels: {2: 256, 1: 128}
            - class_path: rslearn.train.tasks.segmentation.SegmentationHead
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 0.0001
    scheduler:
      class_path: rslearn.train.scheduler.PlateauScheduler
      init_args:
        factor: 0.2
        patience: 2
        min_lr: 0
        cooldown: 10
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/change_finder/ts_change_v1/
    inputs:
      sentinel2_l2a:
        data_type: "raster"
        layers: ["sentinel2"]
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32
        load_all_layers: true
        load_all_item_groups: true
      label_binary:
        data_type: "raster"
        layers: ["label_binary"]
        bands: ["label"]
        is_target: true
        dtype: INT32
      label_src:
        data_type: "raster"
        layers: ["label_src"]
        bands: ["label"]
        is_target: true
        dtype: INT32
      label_dst:
        data_type: "raster"
        layers: ["label_dst"]
        bands: ["label"]
        is_target: true
        dtype: INT32
    task:
      class_path: rslp.change_finder.land_cover_time_series_change_model.tasks.ChangeMultiTask
      init_args:
        annotations_path: /weka/dfive-default/rslearn-eai/datasets/change_finder/ts_change_v1/ts_change_annotations.json
        input_mapping:
          binary:
            label_binary: targets
          src:
            label_src: targets
          dst:
            label_dst: targets
        tasks:
          binary:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              num_classes: 3
              nodata_value: 0
              enable_confusion_matrix: true
              class_names: ["nodata", "no_change", "change"]
              metric_kwargs:
                average: "micro"
              other_metrics:
                auroc:
                  class_path: rslearn.train.tasks.segmentation.SegmentationMetric
                  init_args:
                    metric:
                      class_path: torchmetrics.classification.MulticlassAUROC
                      init_args:
                        num_classes: 3
                        average: "macro"
          src:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              num_classes: 13
              nodata_value: 0
              enable_confusion_matrix: true
              class_names: ["nodata", "bare", "burnt", "crops", "fallow/shifting cultivation", "grassland", "Lichen and moss", "shrub", "snow and ice", "tree", "urban/built-up", "water", "wetland (herbaceous)"]
              metric_kwargs:
                average: "micro"
          dst:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              num_classes: 13
              nodata_value: 0
              enable_confusion_matrix: true
              class_names: ["nodata", "bare", "burnt", "crops", "fallow/shifting cultivation", "grassland", "Lichen and moss", "shrub", "snow and ice", "tree", "urban/built-up", "water", "wetland (herbaceous)"]
              metric_kwargs:
                average: "micro"
    batch_size: 8
    num_workers: 32
    use_in_memory_dataset: true
    default_config:
      crop_size: 64
      transforms:
        - class_path: rslp.change_finder.land_cover_time_series_change_model.transforms.TimeSeriesChangeSubsample
          init_args:
            deterministic: true
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
    train_config:
      transforms:
        - class_path: rslp.change_finder.land_cover_time_series_change_model.transforms.TimeSeriesChangeSubsample
          init_args:
            deterministic: false
        - class_path: rslearn.train.transforms.flip.Flip
          init_args:
            image_selectors:
              - "sentinel2_l2a"
              - "target/binary/classes"
              - "target/binary/valid"
              - "target/src/classes"
              - "target/src/valid"
              - "target/dst/classes"
              - "target/dst/valid"
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
      tags:
        split: "train"
    val_config:
      load_all_crops: true
      tags:
        split: "val"
    test_config:
      load_all_crops: true
      tags:
        split: "val"
    predict_config:
      groups: ["predict"]
      load_all_crops: true
      overlap_pixels: 8
      skip_targets: true
      transforms:
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
trainer:
  max_epochs: 100
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: "epoch"
    - class_path: rslearn.train.callbacks.freeze_unfreeze.FreezeUnfreeze
      init_args:
        module_selector: ["model", "encoder", 0]
        unfreeze_at_epoch: 10
        unfreeze_lr_factor: 10
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_loss
        mode: min
    - class_path: rslearn.train.prediction_writer.RslearnWriter
      init_args:
        output_layer: output_change
        selector: []
project_name: 2026_05_land_cover_ts_change
run_name: olmoearth_base_s2_q12_ws64_ps4_01
management_dir: ${RSLP_PREFIX}/projects
