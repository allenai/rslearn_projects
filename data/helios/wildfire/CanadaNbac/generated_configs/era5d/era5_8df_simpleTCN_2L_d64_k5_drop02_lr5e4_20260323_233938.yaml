model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslearn.models.multitask.MultiTaskModel
      init_args:
        encoder:
        - class_path: rslearn.models.tcn_encoder.SimpleTCNEncoder
          init_args:
            in_channels: 14
            num_conv_layers: 2
            base_dim: 64
            width_mult: 2
            mlp_ratio: 2
            output_dim: 2
            start_kernel_size: 5
            dropout: 0.2
            output_spatial_size: 1
        decoders:
          segmentation:
          - class_path: rslearn.train.tasks.segmentation.SegmentationHead
            init_args:
              weights:
              - 0.4
              - 0.6
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 0.0005
        weight_decay: 0.02
    scheduler:
      class_path: rslearn.train.scheduler.CosineAnnealingScheduler
      init_args:
        T_max: 40
        eta_min_factor: 0.01
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/wildfire/canada_nbac
    inputs:
      era5_daily:
        data_type: raster
        layers:
        - era5_8dforecast
        use_all_bands_in_order_of_band_set_idx: 0
        passthrough: true
        dtype: FLOAT32
      label:
        data_type: raster
        layers:
        - label_100m
        bands:
        - label_100m
        dtype: INT32
        is_target: true
    task:
      class_path: rslearn.train.tasks.multi_task.MultiTask
      init_args:
        tasks:
          segmentation:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              num_classes: 2
              enable_miou_metric: true
              enable_f1_metric: true
              report_metric_per_class: true
              other_metrics:
                PRAUC_cls0:
                  class_path: rslearn.train.tasks.segmentation.SegmentationMetric
                  init_args:
                    metric:
                      class_path: torchmetrics.classification.MulticlassAveragePrecision
                      init_args:
                        num_classes: 2
                        average: null
                        thresholds: 128
                    class_idx: 0
                PRAUC_cls1:
                  class_path: rslearn.train.tasks.segmentation.SegmentationMetric
                  init_args:
                    metric:
                      class_path: torchmetrics.classification.MulticlassAveragePrecision
                      init_args:
                        num_classes: 2
                        average: null
                        thresholds: 128
                    class_idx: 1
        input_mapping:
          segmentation:
            label: targets
    batch_size: 64
    num_workers: 16
    default_config:
      transforms:
      - class_path: rslearn.train.transforms.normalize.Normalize
        init_args:
          mean: &id001
          - -3.30546649
          - -0.00115266
          - -0.01093713
          - 0.00134583
          - 94582.0162208
          - 12499732.41511201
          - 17005837.31171564
          - -5072686.89569636
          - 0.36648215
          - 0.36040571
          - 2.29299751
          - 0.00164887
          - 0.08920109
          - 0.07433319
          std: &id002
          - 9.1623422
          - 0.00105223
          - 0.00964415
          - 0.00316157
          - 4863.30295829
          - 6777222.05066305
          - 7399997.35708814
          - 2194645.74649882
          - 0.13852829
          - 0.13592012
          - 10.18087003
          - 0.00370383
          - 1.81719633
          - 1.71739672
          selectors:
          - era5_daily
      - class_path: rslearn.train.transforms.resize.MaxPoolResize
        init_args:
          target_size:
          - 1
          - 1
          selectors:
          - target/segmentation/classes
          - target/segmentation/valid
    train_config:
      groups:
      - train
      transforms:
      - class_path: rslearn.train.transforms.normalize.Normalize
        init_args:
          mean: *id001
          std: *id002
          selectors:
          - era5_daily
      - class_path: rslearn.train.transforms.ts_augment.RandomTimeMasking
        init_args:
          mask_ratio: 0.1
          selectors:
          - era5_daily
      - class_path: rslearn.train.transforms.ts_augment.TemporalShift
        init_args:
          max_shift: 2
          selectors:
          - era5_daily
      - class_path: rslearn.train.transforms.gaussian_noise.GaussianNoise
        init_args:
          std: 0.02
          selectors:
          - era5_daily
      - class_path: rslearn.train.transforms.resize.MaxPoolResize
        init_args:
          target_size:
          - 1
          - 1
          selectors:
          - target/segmentation/classes
          - target/segmentation/valid
    val_config:
      groups:
      - val
    test_config:
      groups:
      - test
    predict_config:
      skip_targets: true
trainer:
  max_epochs: 40
  callbacks:
  - class_path: lightning.pytorch.callbacks.progress.tqdm_progress.TQDMProgressBar
  - class_path: lightning.pytorch.callbacks.LearningRateMonitor
    init_args:
      logging_interval: epoch
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      save_top_k: 1
      save_last: true
      monitor: val_segmentation/PRAUC_cls1
      mode: max
rslp_project: 20260321_wf_nbac_newsample
rslp_experiment: era5_8df_simpleTCN_2L_d64_k5_drop02_lr5e4
