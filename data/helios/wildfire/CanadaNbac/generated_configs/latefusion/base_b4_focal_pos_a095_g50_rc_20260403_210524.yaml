model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslearn.models.multitask.MultiTaskModel
      init_args:
        encoder:
        - class_path: rslearn.models.xatt_fusion.CrossAttentionFusionExtractor
          init_args:
            primary_path:
            - class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
              init_args:
                model_id: OLMOEARTH_V1_BASE
                patch_size: 5
                use_legacy_timestamps: false
                token_pooling: false
            - class_path: rslearn.models.attention_pooling.AttentionPool
              init_args:
                in_dim: 768
                num_heads: 8
                linear_on_kv: true
            context_paths:
            - - class_path: rslearn.models.transformer_encoder.PatchTransformerEncoder
                init_args:
                  in_channels: 14
                  d_model: 192
                  d_output: 256
                  num_layers: 4
                  num_heads: 4
                  patch_kernel_size: 14
                  patch_stride: 7
                  mlp_ratio: 4
                  head_mlp_ratio: 2
                  dropout: 0.2
                  attention_dropout: 0.1
                  drop_path_rate: 0.1
                  pooling: attention
                  add_day_of_year_features: true
                  add_relative_position_features: true
                  position_encoding: sinusoidal
                  max_position_embeddings: 512
                  mod_key: era5_daily
                  output_spatial_size: 10
                  has_mask_channel: false
                  pad_value: 0.0
            primary_output_channels: 768
            context_output_channels:
            - 256
            attention_dim: 256
            num_memory_tokens: 4
            num_heads: 4
            attention_dropout: 0.1
            residual_dropout: 0.0
            post_fusion_mode: self_attn_ffn
            ffn_expansion: 2.0
            ffn_activation: swiglu
            ffn_dropout: 0.1
            pre_fusion_dropout: 0.1
        decoders:
          segmentation:
          - class_path: rslearn.models.conv.Conv
            init_args:
              in_channels: 768
              out_channels: 2
              kernel_size: 2
              padding: valid
              stride: 2
              activation:
                class_path: torch.nn.Identity
          - class_path: rslearn.train.tasks.segmentation.SegmentationHead
            init_args:
              weights:
              - 0.05
              - 0.95
              dice_loss: true
              focal_loss: true
              focal_loss_alpha: 0.95
              focal_loss_gamma: 5.0
              loss_weights:
              - 1.0
              - 1.0
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 1.0e-06
        weight_decay: 0.01
    scheduler:
      class_path: rslearn.train.scheduler.CosineAnnealingScheduler
      init_args:
        T_max: 40
        eta_min_factor: 0.05
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/wildfire/canada_nbac
    inputs:
      sentinel2_l2a:
        data_type: raster
        layers:
        - sentinel2
        bands: &id001
        - B02
        - B03
        - B04
        - B08
        - B05
        - B06
        - B07
        - B8A
        - B11
        - B12
        - B01
        - B09
        passthrough: true
        dtype: FLOAT32
        load_all_item_groups: true
        load_all_layers: true
      era5_daily:
        data_type: raster
        layers:
        - era5_365dhistory
        use_all_bands_in_order_of_band_set_idx: 0
        passthrough: true
        dtype: FLOAT32
        resolution_factor:
          class_path: rslearn.utils.geometry.ResolutionFactor
          init_args:
            numerator: 1
            denominator: 260
      label:
        data_type: raster
        layers:
        - label_100m
        bands:
        - label_100m
        dtype: INT32
        is_target: true
        resolution_factor:
          class_path: rslearn.utils.geometry.ResolutionFactor
          init_args:
            numerator: 1
            denominator: 1
    task:
      class_path: rslearn.train.tasks.multi_task.MultiTask
      init_args:
        tasks:
          segmentation:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              num_classes: 2
              enable_miou_metric: true
              enable_f1_metric: true
              report_metric_per_class: true
              other_metrics:
                PRAUC_cls0:
                  class_path: rslearn.train.tasks.segmentation.SegmentationMetric
                  init_args:
                    metric:
                      class_path: torchmetrics.classification.MulticlassAveragePrecision
                      init_args:
                        num_classes: 2
                        average: null
                        thresholds: 128
                    class_idx: 0
                PRAUC_cls1:
                  class_path: rslearn.train.tasks.segmentation.SegmentationMetric
                  init_args:
                    metric:
                      class_path: torchmetrics.classification.MulticlassAveragePrecision
                      init_args:
                        num_classes: 2
                        average: null
                        thresholds: 128
                    class_idx: 1
        input_mapping:
          segmentation:
            label: targets
    batch_size: 16
    num_workers: 16
    default_config:
      crop_size: 50
      transforms:
      - class_path: rslearn.train.transforms.normalize.Normalize
        init_args:
          mean:
          - 268.209
          - -0.00113
          - -0.00833
          - 0.000897
          - 94745.2
          - 9079014.2
          - 11716921.0
          - -4499458.3
          - 0.343
          - 0.339
          - -0.0584
          - 0.00188
          - 0.463
          - 0.0691
          std:
          - 14.149
          - 0.00125
          - 0.00966
          - 0.00221
          - 5192.3
          - 7486798.9
          - 8479277.6
          - 2228211.3
          - 0.1436
          - 0.1426
          - 13.825
          - 0.00425
          - 1.787
          - 1.697
          selectors:
          - era5_daily
      - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
        init_args:
          band_names:
            sentinel2_l2a: *id001
      - class_path: rslearn.train.transforms.resize.MaxPoolResize
        init_args:
          target_size:
          - 5
          - 5
          selectors:
          - target/segmentation/classes
          - target/segmentation/valid
    train_config:
      groups:
      - train
      transforms:
      - class_path: rslearn.train.transforms.flip.Flip
        init_args:
          horizontal: true
          vertical: true
          image_selectors:
          - sentinel2_l2a
          - target/segmentation/classes
          - target/segmentation/valid
      - class_path: rslearn.train.transforms.normalize.Normalize
        init_args:
          mean:
          - 268.209
          - -0.00113
          - -0.00833
          - 0.000897
          - 94745.2
          - 9079014.2
          - 11716921.0
          - -4499458.3
          - 0.343
          - 0.339
          - -0.0584
          - 0.00188
          - 0.463
          - 0.0691
          std:
          - 14.149
          - 0.00125
          - 0.00966
          - 0.00221
          - 5192.3
          - 7486798.9
          - 8479277.6
          - 2228211.3
          - 0.1436
          - 0.1426
          - 13.825
          - 0.00425
          - 1.787
          - 1.697
          selectors:
          - era5_daily
      - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
        init_args:
          band_names:
            sentinel2_l2a:
            - B02
            - B03
            - B04
            - B08
            - B05
            - B06
            - B07
            - B8A
            - B11
            - B12
            - B01
            - B09
      - class_path: rslearn.train.transforms.random_time_dropping.RandomTimeDropping
        init_args:
          drop_ratio: 0.5
          min_keep: 2
          selectors:
          - sentinel2_l2a
      - class_path: rslearn.train.transforms.ts_augment.RandomTimeMasking
        init_args:
          mask_ratio: 0.4
          selectors:
          - era5_daily
      - class_path: rslearn.train.transforms.ts_augment.TemporalShift
        init_args:
          max_shift: 2
          selectors:
          - era5_daily
      - class_path: rslearn.train.transforms.resize.MaxPoolResize
        init_args:
          target_size:
          - 5
          - 5
          selectors:
          - target/segmentation/classes
          - target/segmentation/valid
    val_config:
      groups:
      - val
    test_config:
      groups:
      - test
      load_all_crops: true
    predict_config:
      load_all_crops: true
      overlap_pixels: 5
      skip_targets: true
trainer:
  max_epochs: 40
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      group: late_fusion
  callbacks:
  - class_path: lightning.pytorch.callbacks.progress.tqdm_progress.TQDMProgressBar
  - class_path: lightning.pytorch.callbacks.LearningRateMonitor
    init_args:
      logging_interval: epoch
  - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
    init_args:
      monitor: val_segmentation/PRAUC_cls1
      mode: max
  - class_path: rslearn.train.callbacks.freeze_unfreeze.MultiStageFineTuning
    init_args:
      stages:
      - at_epoch: 0
        freeze_selectors:
        - model.encoder.0.paths.0.0
        unfreeze_selectors: []
      - at_epoch: 15
        freeze_selectors: []
        unfreeze_selectors:
        - model.encoder.0.paths.0.0
        unfreeze_lr_factor: 1.0
        scale_existing_groups: 0.1
management_dir: ${RSLP_PREFIX}/projects
project_name: 20260329_wf_nbac_newsample_LF
run_name: base_b4_focal_pos_a095_g50_rc
